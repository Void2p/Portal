<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    /* Substitua 'link_da_imagem' pelo caminho real do arquivo ou pela URL que te enviei */
    background: url("img/Login.png") no-repeat center center fixed;
    background-size: cover; 
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'IM Fell English SC', serif;
    overflow: hidden;
    background-color: black; /* Cor de fundo caso a imagem demore a carregar */
}

/* Estrelas - mantive para dar um efeito de brilho sobre a imagem */
.star {
    position: absolute;
    width: 2px; /* Reduzi um pouco para não poluir o fundo detalhado */
    height: 2px;
    background: #a11228;
    border-radius: 50%;
    box-shadow: 0 0 8px #a11228;
    animation: blink 2s infinite alternate;
    pointer-events: none; /* Garante que as estrelas não atrapalhem cliques */
}

@keyframes blink {
    from { opacity: 0.2; }
    to { opacity: 0.8; }
}

/* Caixa */
.login-box {
    width: 320px;
    padding: 40px;
    border: 2px solid #7a1e2d; /* Diminuí levemente a borda */
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.9); /* Sombra mais escura para destacar do fundo */
    background-color: rgba(0, 0, 0, 0.8); /* Fundo mais escuro para facilitar a leitura */
    backdrop-filter: blur(5px);
    text-align: center;
    color: #ffb3c6;
    z-index: 10; /* Garante que fique acima das estrelas */
}

input {
    width: 80%;
    padding: 10px;
    margin-top: 20px;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid #a11228;
    color: #ffb3c6;
    text-align: center;
    outline: none;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid #a11228;
    color: #a11228;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    transition: 0.3s;
}

button:hover {
    background: #a11228;
    color: black;
    box-shadow: 0 0 15px #a11228;
}

#mensagem {
    margin-top: 15px;
    color: #ff0040;
    font-weight: bold;
}

.shake { 
    animation: shake 0.5s; 
    border-color: #ff0000 !important; 
    box-shadow: 0 0 40px #ff0000 !important;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-12px); }
    40% { transform: translateX(12px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
}

</style>
</head>

<body>

<div class="login-box">
    <h2 style="font-family: 'Pirata One', cursive; font-size: 2.5rem; margin-bottom: 0;">Nosso Portal</h2>
    <p>Somente nós dois.</p>

    <input type="password" id="senha" placeholder="Senha">
    <br>
    <button onclick="entrar()">Entrar</button>

    <p id="mensagem"></p>
</div>

<script>
/* estrelas */
for(let i=0;i<60;i++){ 
    let star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"%";
    star.style.left=Math.random()*100+"%";
    star.style.animationDuration=(Math.random()*3+1)+"s";
    document.body.appendChild(star);
}

// Atalho para a tecla Enter
const inputSenha = document.getElementById("senha");

inputSenha.addEventListener("keypress", function(event) {
    // Verifica se a tecla apertada foi 'Enter' (código 13)
    if (event.key === "Enter") {
        // Cancela o comportamento padrão (se houver) e clica no botão
        event.preventDefault();
        entrar();
    }
});

function entrar() {
    let senha = document.getElementById("senha").value;

    if (senha === "goth") {
        window.location.href = "portal.html"; // O seu site principal
    } 
    else if (senha === "hellokitty" || senha === "hello") { 
        window.location.href = "Hello kitty.html"; // O memorial da Hello Kitty
    }
    else if (senha === "nenem") {
        document.getElementById("mensagem").innerText = "Eu te amo MUUUIITOO.";
    } 
    else if (senha === "papai") {
        document.getElementById("mensagem").innerText = "QUE LINDAAA VOSE ACERTOU";
    } 
    else if (senha === "segredo") {
        document.getElementById("mensagem").innerText = "Nossa, viu nos códigos ou eu não aguentei e te falei?";
    } 
    else {
        const box = document.querySelector('.login-box');
        box.classList.add('shake');
        document.getElementById("mensagem").innerText = "Senha errada.";
        
        // Remove a classe depois que a animação acaba para poder repetir se errar de novo
        setTimeout(() => {
            box.classList.remove('shake');
        }, 500);
    }
}
    
</script>

</body>
</html>
